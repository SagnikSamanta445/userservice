spring.application.name=userservice
# ======================
# KAFKA CONFIG
# ======================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=userinfo-consumer-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.co nsumer.value-deserializer=com.sagnik445.userservice.deserializer.UserInfoDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=com.sagnik445.userservice.entities.UserInfoDto

spring.kafka.topic.name=testingself
spring.kafka.topic.json.name=testingself_json


# ======================
# DATABASE CONFIG
# ======================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:userservice}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ======================
# SERVER
# ======================
server.port=9810


# ======================
# LOGGING
# ======================
logging.level.org.springframework.security=DEBUG
logging.level.your.package.name=DEBUG